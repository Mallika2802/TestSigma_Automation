name: Testsigma - Sanity Linux

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 5 * * *"   # 10:30 AM IST (05:00 UTC)

jobs:
  testsigma-linux:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        suite:
          - name: CUCS_SANITY_LINUX
            testplan_secret: CUCS_LINUX_ALL_LATEST_BROWSERS

    env:
      TESTSIGMA_API_URL: "https://app.testsigma.com/api/v1"

    steps:
      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Trigger Testsigma Execution (${{ matrix.suite.name }})
        id: trigger
        shell: bash
        env:
          TESTSIGMA_API_KEY: ${{ secrets.TESTSIGMA_API_KEY }}
          TESTSIGMA_TESTPLAN_ID: ${{ secrets[matrix.suite.testplan_secret] }}
          TESTSIGMA_ENVIRONMENT_ID: ${{ secrets.TESTSIGMA_ENVIRONMENT_ID }}
        run: |
          set -euo pipefail
          echo "=== Triggering Testsigma: ${{ matrix.suite.name }} ==="

          payload=$(jq -n \
            --arg exec "$TESTSIGMA_TESTPLAN_ID" \
            --arg envId "$TESTSIGMA_ENVIRONMENT_ID" \
            '{executionId:($exec|tonumber), environmentId:($envId|tonumber)}')

          HTTP=$(curl -sS -w "%{http_code}" -o response.json \
            -X POST \
            -H "Authorization: Bearer ${TESTSIGMA_API_KEY}" \
            -H "Content-Type: application/json" \
            "${TESTSIGMA_API_URL}/execution_results" \
            -d "$payload")

          if [[ "$HTTP" != "200" && "$HTTP" != "201" ]]; then
            echo "❌ Trigger failed"
            exit 1
          fi

          RUN_ID=$(jq -r '.id // .result.id // .data.id // empty' response.json)
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"

      - name: Poll Testsigma Until Complete (${{ matrix.suite.name }})
        shell: bash
        env:
          TESTSIGMA_API_KEY: ${{ secrets.TESTSIGMA_API_KEY }}
          RUN_ID: ${{ steps.trigger.outputs.run_id }}
        run: |
          set -euo pipefail
          ATTEMPTS=240
          SLEEP_SECS=15

          for ((i=1; i<=ATTEMPTS; i++)); do
            curl -sS -o status.json \
              -H "Authorization: Bearer ${TESTSIGMA_API_KEY}" \
              "${TESTSIGMA_API_URL}/execution_results/${RUN_ID}"

            STATUS=$(jq -r '.status // .data.status // empty' status.json)
            RESULT=$(jq -r '.result // .data.result // empty' status.json)

            echo "[$i/$ATTEMPTS] STATUS=$STATUS RESULT=$RESULT"

            if [[ "$STATUS" == "STATUS_COMPLETED" || "$STATUS" == "STATUS_FINISHED" ]]; then
              # status.json just written above now reflects the final state
              exit 0
            fi

            if [[ "$STATUS" =~ STATUS_FAILED|STATUS_ABORTED|STATUS_STOPPED|STATUS_CANCELLED ]]; then
              exit 1
            fi

            sleep "$SLEEP_SECS"
          done

          echo "❌ Timed out"
          exit 1

      - name: Generate HTML Report (${{ matrix.suite.name }})
        if: always()
        env:
          RUN_ID: ${{ steps.trigger.outputs.run_id }}
        run: |
          python << 'EOF'
          import json, html, os, datetime

          def load(path):
              try:
                  with open(path, "r") as f:
                      return json.load(f)
              except:
                  return {}

          def ts(ms):
              try:
                  return datetime.datetime.utcfromtimestamp(ms/1000).strftime("%Y-%m-%d %H:%M:%S UTC")
              except:
                  return "N/A"

          response = load("response.json")
          status = load("status.json")

          # Build a small summary (safe: no f-strings in template)
          run_id = os.getenv("RUN_ID", "") or str(status.get("id") or response.get("id") or "")
          plan_name  = (status.get("execution") or {}).get("name", "N/A")
          env_name   = (status.get("environment") or {}).get("name", "N/A")
          start      = ts(status.get("startTime") or response.get("startTime"))
          end        = ts(status.get("endTime"))
          duration   = str(status.get("duration", "N/A"))
          status_txt = status.get("status", "N/A")
          result_txt = status.get("result", "N/A")

          res_html = html.escape(json.dumps(response, indent=2))
          stat_html = html.escape(json.dumps(status, indent=2))

          html_out = """
          <html>
          <head>
            <meta charset="utf-8">
            <title>CUCS SANITY LINUX REPORT</title>
            <style>
              body { font-family: Arial; padding: 20px; color:#1f2937; }
              h1 { color:#1d4ed8; }
              h2 { border-bottom:1px solid #e5e7eb; padding-bottom:4px; }
              .grid { display:grid; grid-template-columns:220px 1fr; gap:8px 12px; }
              .key { font-weight:600; color:#374151; }
              pre { background:#111827; color:#e5e7eb; padding:12px; border-radius:8px; overflow:auto; }
            </style>
          </head>
          <body>
            <h1>CUCS SANITY LINUX — Report</h1>

            <h2>Summary</h2>
            <div class="grid">
              <div class="key">Run ID</div><div>{RUN_ID}</div>
              <div class="key">Test Plan</div><div>{PLAN}</div>
              <div class="key">Environment</div><div>{ENV}</div>
              <div class="key">Start Time</div><div>{START}</div>
              <div class="key">End Time</div><div>{END}</div>
              <div class="key">Duration (ms)</div><div>{DUR}</div>
              <div class="key">Status</div><div>{STATUS}</div>
              <div class="key">Result</div><div>{RESULT}</div>
            </div>

            <h2>response.json</h2>
            <pre>{RESPONSE}</pre>

            <h2>status.json</h2>
            <pre>{STATUS_JSON}</pre>
          </body>
          </html>
          """
          html_out = (html_out
            .replace("{RUN_ID}", html.escape(run_id))
            .replace("{PLAN}", html.escape(plan_name))
            .replace("{ENV}", html.escape(env_name))
            .replace("{START}", html.escape(start))
            .replace("{END}", html.escape(end))
            .replace("{DUR}", html.escape(duration))
            .replace("{STATUS}", html.escape(status_txt))
            .replace("{RESULT}", html.escape(result_txt))
            .replace("{RESPONSE}", res_html)
            .replace("{STATUS_JSON}", stat_html)
          )

          with open("cucs_sanity_linux_report.html", "w", encoding="utf-8") as f:
              f.write(html_out)

          print("HTML report generated successfully!")
          EOF

      - name: List files created (debug)
        if: always()
        run: |
          echo "Workspace content before upload:"
          ls -al

      - name: Upload Artifacts (${{ matrix.suite.name }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: CUCS_SANITY_LINUX_REPORT
          path: |
            response.json
            status.json
            cucs_sanity_linux_report.html
          # retention-days: 14  # (optional) keep artifacts for 14 days
