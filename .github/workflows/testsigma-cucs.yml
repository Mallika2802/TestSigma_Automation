name: Testsigma - Parallel CUCS Suites

on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 5 * * *"   # 10:30 AM IST (05:00 UTC)

jobs:
  testsigma:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        suite:
          # ---- CUCS test plans ----
          - name: CUCS_SANITY_WINDOWS
            testplan_secret: CUCS_WINDOWS_ALL_LATEST_BROWSERS

    env:
      TESTSIGMA_API_URL: "https://app.testsigma.com/api/v1"

    steps:
      - name: Install jq
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq

      - name: Trigger Testsigma Execution (${{ matrix.suite.name }})
        id: trigger
        shell: bash
        env:
          TESTSIGMA_API_KEY: ${{ secrets.TESTSIGMA_API_KEY }}
          TESTSIGMA_TESTPLAN_ID: ${{ secrets[matrix.suite.testplan_secret] }}
          TESTSIGMA_ENVIRONMENT_ID: ${{ secrets.TESTSIGMA_ENVIRONMENT_ID }}
        run: |
          set -euo pipefail

          echo "=== Triggering Testsigma: ${{ matrix.suite.name }} ==="
          echo "TestPlanId=$TESTSIGMA_TESTPLAN_ID  EnvironmentId=$TESTSIGMA_ENVIRONMENT_ID"

          # Build payload as NUMBERS
          payload=$(jq -n \
            --arg exec "$TESTSIGMA_TESTPLAN_ID" \
            --arg envId "$TESTSIGMA_ENVIRONMENT_ID" \
            '{executionId:($exec|tonumber), environmentId:($envId|tonumber)}')

          HTTP=$(curl -sS -w "%{http_code}" -o response.json \
            -X POST \
            -H "accept: application/json" \
            -H "Authorization: Bearer ${TESTSIGMA_API_KEY}" \
            -H "Content-Type: application/json" \
            "${TESTSIGMA_API_URL}/execution_results" \
            -d "$payload")

          echo "HTTP=$HTTP"
          jq . response.json || cat response.json

          if [[ "$HTTP" != "200" && "$HTTP" != "201" ]]; then
            echo "❌ Trigger failed (HTTP $HTTP)"
            exit 1
          fi

          RUN_ID=$(jq -r '.id // .result.id // .data.id // empty' response.json)
          if [[ -z "$RUN_ID" || "$RUN_ID" == "null" ]]; then
            echo "❌ Could not extract RUN_ID"
            exit 1
          fi

          echo "✅ RUN_ID=$RUN_ID"
          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Run URL: https://app.testsigma.com/ui/executions/${RUN_ID}"

      - name: Poll Testsigma Until Complete (${{ matrix.suite.name }})
        shell: bash
        env:
          TESTSIGMA_API_KEY: ${{ secrets.TESTSIGMA_API_KEY }}
          RUN_ID: ${{ steps.trigger.outputs.run_id }}
        run: |
          set -euo pipefail

          echo "=== Polling: ${{ matrix.suite.name }} | RUN_ID=$RUN_ID ==="
          echo "Run URL: https://app.testsigma.com/ui/executions/${RUN_ID}"

          # 60 minutes max => 240 * 15s
          ATTEMPTS=240
          SLEEP_SECS=15

          for ((i=1; i<=ATTEMPTS; i++)); do
            curl -sS -o status.json \
              -H "Authorization: Bearer ${TESTSIGMA_API_KEY}" \
              -H "accept: application/json" \
              "${TESTSIGMA_API_URL}/execution_results/${RUN_ID}"

            STATUS=$(jq -r '.status // .data.status // empty' status.json)
            RESULT=$(jq -r '.result // .data.result // empty' status.json)
            MESSAGE=$(jq -r '.message // .data.message // empty' status.json)

            echo "[${{ matrix.suite.name }} Attempt $i/$ATTEMPTS] STATUS=$STATUS RESULT=$RESULT MESSAGE=$MESSAGE"

            # Terminal success states
            if [[ "$STATUS" == "STATUS_COMPLETED" || "$STATUS" == "STATUS_FINISHED" ]]; then
              echo "✅ Finished: STATUS=$STATUS RESULT=$RESULT"
              if [[ "$RESULT" == "PASSED" || "$RESULT" == "PASS" || "$RESULT" == "SUCCESS" ]]; then
                echo "✅ ${{ matrix.suite.name }} PASSED ($RESULT)"
                exit 0
              else
                echo "❌ ${{ matrix.suite.name }} NOT PASSED. RESULT=$RESULT"
                exit 1
              fi
            fi

            # Terminal failure states
            if [[ "$STATUS" == "STATUS_FAILED" || "$STATUS" == "STATUS_ABORTED" || "$STATUS" == "STATUS_STOPPED" || "$STATUS" == "STATUS_CANCELLED" ]]; then
              echo "❌ ${{ matrix.suite.name }} FAILED. STATUS=$STATUS RESULT=$RESULT"
              exit 1
            fi

            sleep "$SLEEP_SECS"
          done

          echo "❌ Timed out waiting for ${{ matrix.suite.name }} (RUN_ID=$RUN_ID)"
          exit 1

      # ─────────────────────────────────────────────────────────────
      # HTML REPORT (JUnit XML → HTML) — runs after polling completes
      # ─────────────────────────────────────────────────────────────
      - name: (Optional) Download JUnit XML for ${{ matrix.suite.name }}
        if: always()
        env:
          TESTSIGMA_API_KEY: ${{ secrets.TESTSIGMA_API_KEY }}
          RUN_ID: ${{ steps.trigger.outputs.run_id }}
        run: |
          set -euo pipefail
          mkdir -p test-results

          echo "If your account has JUnit export enabled, you can save the XML into ./test-results/"
          echo "Manual export path: Testsigma UI → Run Results → Export → 'JUnit report' (XML)."
          echo "Docs: https://github.com/testsigmahq/testsigma-docs/blob/dev/src/pages/docs/reports/export-reports/export-reports-junit.md"

          # If you have a direct API endpoint for JUnit XML, put it here (replace and uncomment):
          # curl -fSL -H "Authorization: Bearer ${TESTSIGMA_API_KEY}" \
          #   "https://app.testsigma.com/api/v1/execution_results/${RUN_ID}/junit" \
          #   -o "test-results/${RUN_ID}-${{ matrix.suite.name }}.xml" || true

          if ! ls test-results/*.xml >/dev/null 2>&1; then
            echo "NOTE: No JUnit XML present in ./test-results yet – conversion will skip gracefully."
          fi

      - name: Install junit2html
        if: always()
        run: |
          python3 -m pip install --user junit2html

      - name: Convert JUnit → HTML (${{ matrix.suite.name }})
        if: always()
        run: |
          set -euo pipefail
          mkdir -p html-report
          if compgen -G "test-results/*.xml" > /dev/null; then
            echo "Found JUnit XML files:"
            ls -lah test-results/*.xml || true
            # Convert all XMLs under test-results into a single HTML index
            ~/.local/bin/junit2html test-results html-report/index.html
            echo "HTML report created at html-report/index.html"
          else
            echo "No JUnit XML found under ./test-results — skipping HTML conversion."
            # Still upload a friendly placeholder page
            cat > html-report/index.html <<'HTML'
            <!doctype html>
            <meta charset="utf-8">
            <title>No JUnit XML found</title>
            <h1>No JUnit XML found</h1>
            <p>This workflow did not find any JUnit XML in <code>./test-results</code> for conversion.</p>
            <p>Export JUnit from Testsigma Run Results (Export → JUnit report) and place it under <code>test-results/</code> to generate a report on the next run.</p>
            HTML
          fi

      - name: Upload HTML report (${{ matrix.suite.name }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testsigma-junit-html-${{ matrix.suite.name }}
          path: html-report

      - name: Upload Artifacts (${{ matrix.suite.name }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: testsigma-${{ matrix.suite.name }}-${{ steps.trigger.outputs.run_id }}
          path: |
            response.json
            status.json
